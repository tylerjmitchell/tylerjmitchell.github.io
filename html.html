<!DOCTYPE html>
<html>
<head>
  <title>HTML editor</title>
  <style>
    body {
      display: flex;
      font-family: helvetica;
      margin: 16px auto;
    }

    #editor {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
    }

    #preview {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
    }
::selection {
      background: #FAE4A0;
    }
    a {
      color: #ce1256;
    }
    a:link {
      text-decoration: none;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100px;
    }
    select {
      width: 100px;
    }
    button {
      margin-top: 10px;
    }
    p {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div id="editor">
    <h2>Write your HTML code here:</h2>
    <textarea id="html-input" rows="15" cols="50"></textarea>
    <br>
    <button onclick="updatePreview()">Update preview!</button>
<br>
<p>for testing purposes!</p>
<p>inspired by <a href="https://www.w3schools.com/html/tryit.asp?filename=tryhtml_basic">W3Schools Tryit Editor</a></p>
<p><a href="https://tylermitchell.earth"><-- back to tylermitchell.earth✨</a></p>
  </div>
  <div id="preview">
    <h2>Preview:</h2>
    <iframe id="output" width="100%" height="500"></iframe>
  </div>

  <script>
    function updatePreview() {
      const htmlCode = document.getElementById('html-input').value;
      const iframe = document.getElementById('output').contentDocument;
      iframe.open();
      iframe.write(htmlCode);
      iframe.close();
    }
  </script>
</body>
</html>
